<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" font-family="'Pretendard','Noto Sans KR',-apple-system,'Segoe UI',sans-serif">
  <defs>
    <linearGradient id="navy2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#3a4cf0"/>
      <stop offset="0.55" stop-color="#232a73"/>
      <stop offset="1" stop-color="#0e1132"/>
    </linearGradient>
    <radialGradient id="stage" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#eef0ff"/>
      <stop offset="1" stop-color="#f7f7f5"/>
    </radialGradient>
    <marker id="arw2" markerWidth="12" markerHeight="12" refX="8" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#3a4cf0"/>
    </marker>
    <filter id="sh2" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="7" flood-color="#15171a" flood-opacity="0.13"/>
    </filter>
  </defs>

  <rect width="1600" height="900" fill="#ffffff"/>

  <!-- Title -->
  <text x="72" y="86" font-size="42" font-weight="700" fill="#15171a">3D 오디오 사운드 렌더링 IP</text>
  <text x="72" y="126" font-size="24" font-weight="600" fill="#3a4cf0">HRTF-based Binaural Rendering — Mobile SoC Audio Pipeline</text>
  <line x1="72" y1="150" x2="1528" y2="150" stroke="#e7e8ec" stroke-width="2"/>

  <!-- ===== Left: spatial scene (listener + sources) ===== -->
  <g transform="translate(72,225)">
    <rect x="0" y="0" width="470" height="460" rx="18" fill="url(#stage)" stroke="#e7e8ec" stroke-width="2" filter="url(#sh2)"/>
    <text x="235" y="40" text-anchor="middle" font-size="19" font-weight="700" fill="#232a73">공간 음원 배치 · Spatial Scene</text>

    <!-- concentric range rings -->
    <g stroke="#c9cbd6" stroke-width="1.2" fill="none" stroke-dasharray="4 6">
      <circle cx="235" cy="260" r="70"/>
      <circle cx="235" cy="260" r="130"/>
      <circle cx="235" cy="260" r="185"/>
    </g>
    <line x1="50" y1="260" x2="420" y2="260" stroke="#e7e8ec" stroke-width="1"/>
    <line x1="235" y1="90" x2="235" y2="430" stroke="#e7e8ec" stroke-width="1"/>

    <!-- listener head at center -->
    <circle cx="235" cy="260" r="30" fill="#1b2461"/>
    <path d="M212,254 q-14,6 0,20" fill="none" stroke="#1b2461" stroke-width="6" stroke-linecap="round"/>
    <path d="M258,254 q14,6 0,20" fill="none" stroke="#1b2461" stroke-width="6" stroke-linecap="round"/>
    <text x="235" y="315" text-anchor="middle" font-size="14" fill="#15171a">Listener 청취자</text>

    <!-- source speakers -->
    <g>
      <!-- front-left -->
      <g transform="translate(120,140)">
        <rect x="-18" y="-14" width="36" height="28" rx="5" fill="#3a4cf0"/>
        <circle cx="0" cy="0" r="7" fill="#ffffff"/>
      </g>
      <!-- front-right -->
      <g transform="translate(350,140)">
        <rect x="-18" y="-14" width="36" height="28" rx="5" fill="#3a4cf0"/>
        <circle cx="0" cy="0" r="7" fill="#ffffff"/>
      </g>
      <!-- rear source -->
      <g transform="translate(300,400)">
        <rect x="-18" y="-14" width="36" height="28" rx="5" fill="#232a73"/>
        <circle cx="0" cy="0" r="7" fill="#ffffff"/>
      </g>
    </g>
    <!-- azimuth/elevation angle arc -->
    <path d="M235,200 A60,60 0 0,0 178,240" fill="none" stroke="#e0413a" stroke-width="2.5"/>
    <text x="150" y="205" font-size="14" font-weight="700" fill="#e0413a">θ, φ</text>
    <text x="235" y="450" text-anchor="middle" font-size="13" fill="#6c727d">azimuth · elevation · distance</text>
  </g>

  <!-- ===== Right: processing pipeline ===== -->
  <!-- 1 Audio source -->
  <g transform="translate(640,215)">
    <rect width="230" height="120" rx="16" fill="#f7f7f5" stroke="#3a4cf0" stroke-width="2.5" filter="url(#sh2)"/>
    <path d="M40,50 h18 l22,-18 v56 l-22,-18 h-18 z" fill="#3a4cf0"/>
    <path d="M92,44 q10,16 0,32 M104,36 q18,28 0,48" fill="none" stroke="#3a4cf0" stroke-width="2.5"/>
    <text x="115" y="98" text-anchor="middle" font-size="19" font-weight="700" fill="#15171a">Audio Source</text>
  </g>
  <text x="755" y="352" text-anchor="middle" font-size="14" fill="#6c727d">모노 음원 (mono)</text>

  <!-- 2 3D position -->
  <g transform="translate(970,215)">
    <rect width="230" height="120" rx="16" fill="#f7f7f5" stroke="#3a4cf0" stroke-width="2.5" filter="url(#sh2)"/>
    <g transform="translate(80,60)" stroke="#232a73" stroke-width="2.5" fill="none">
      <path d="M0,0 L36,0"/><path d="M0,0 L-14,-24"/><path d="M0,0 L0,-34"/>
      <path d="M30,-4 l6,4 l-6,4" /><path d="M-10,-19 l-4,-5 l6,-1"/><path d="M-4,-30 l4,-4 l4,4"/>
    </g>
    <text x="115" y="98" text-anchor="middle" font-size="19" font-weight="700" fill="#15171a">3D Position</text>
  </g>
  <text x="1085" y="352" text-anchor="middle" font-size="14" fill="#6c727d">3D 좌표 (x, y, z)</text>

  <!-- 3 HRTF convolution -->
  <g transform="translate(970,415)">
    <rect width="230" height="150" rx="16" fill="url(#navy2)" filter="url(#sh2)"/>
    <text x="115" y="52" text-anchor="middle" font-size="21" font-weight="700" fill="#ffffff">HRTF</text>
    <text x="115" y="80" text-anchor="middle" font-size="16" fill="#aab6ff">Convolution</text>
    <!-- convolution symbol -->
    <circle cx="115" cy="112" r="18" fill="none" stroke="#8b9bff" stroke-width="2.5"/>
    <path d="M104,112 h22 M115,101 v22" stroke="#8b9bff" stroke-width="2.5"/>
    <text x="115" y="142" text-anchor="middle" font-size="13" fill="#8b9bff">머리전달함수 필터</text>
  </g>

  <!-- 4 Binaural L/R output -->
  <g transform="translate(640,415)">
    <rect width="230" height="150" rx="16" fill="#f7f7f5" stroke="#3a4cf0" stroke-width="2.5" filter="url(#sh2)"/>
    <text x="115" y="44" text-anchor="middle" font-size="19" font-weight="700" fill="#15171a">Binaural Out</text>
    <!-- headphones -->
    <path d="M60,92 a55,55 0 0,1 110,0" fill="none" stroke="#232a73" stroke-width="4"/>
    <rect x="50" y="88" width="20" height="34" rx="6" fill="#3a4cf0"/>
    <rect x="160" y="88" width="20" height="34" rx="6" fill="#3a4cf0"/>
    <text x="42" y="140" font-size="15" font-weight="700" fill="#3a4cf0">L</text>
    <text x="178" y="140" font-size="15" font-weight="700" fill="#3a4cf0">R</text>
    <text x="115" y="140" text-anchor="middle" font-size="13" fill="#6c727d">좌/우 채널</text>
  </g>

  <!-- SoC / IP badge -->
  <g transform="translate(1250,415)">
    <rect width="180" height="150" rx="16" fill="#0e1132" filter="url(#sh2)"/>
    <rect x="30" y="34" width="120" height="82" rx="8" fill="none" stroke="#3a4cf0" stroke-width="2.5"/>
    <g stroke="#3a4cf0" stroke-width="2">
      <line x1="46" y1="34" x2="46" y2="18"/><line x1="76" y1="34" x2="76" y2="18"/>
      <line x1="106" y1="34" x2="106" y2="18"/><line x1="136" y1="34" x2="136" y2="18"/>
      <line x1="46" y1="116" x2="46" y2="132"/><line x1="76" y1="116" x2="76" y2="132"/>
      <line x1="106" y1="116" x2="106" y2="132"/><line x1="136" y1="116" x2="136" y2="132"/>
    </g>
    <text x="90" y="82" text-anchor="middle" font-size="17" font-weight="700" fill="#8b9bff">Audio IP</text>
    <text x="90" y="102" text-anchor="middle" font-size="12" fill="#aab6ff">Mobile SoC</text>
  </g>

  <!-- arrows -->
  <line x1="542" y1="275" x2="636" y2="275" stroke="#3a4cf0" stroke-width="3" fill="none" marker-end="url(#arw2)"/>
  <line x1="870" y1="275" x2="966" y2="275" stroke="#3a4cf0" stroke-width="3" fill="none" marker-end="url(#arw2)"/>
  <path d="M1085,335 L1085,411" stroke="#3a4cf0" stroke-width="3" fill="none" marker-end="url(#arw2)"/>
  <line x1="966" y1="490" x2="874" y2="490" stroke="#3a4cf0" stroke-width="3" fill="none" marker-end="url(#arw2)"/>
  <line x1="1200" y1="490" x2="1246" y2="490" stroke="#3a4cf0" stroke-width="3" fill="none" marker-end="url(#arw2)"/>

  <!-- stage numbers -->
  <g font-size="15" font-weight="700" fill="#ffffff">
    <circle cx="650" cy="205" r="16" fill="#232a73"/><text x="650" y="210" text-anchor="middle">1</text>
    <circle cx="980" cy="205" r="16" fill="#232a73"/><text x="980" y="210" text-anchor="middle">2</text>
    <circle cx="980" cy="405" r="16" fill="#3a4cf0"/><text x="980" y="410" text-anchor="middle">3</text>
    <circle cx="650" cy="405" r="16" fill="#3a4cf0"/><text x="650" y="410" text-anchor="middle">4</text>
  </g>

  <!-- caption -->
  <text x="640" y="640" font-size="17" fill="#6c727d">음원의 3D 위치별 머리전달함수(HRTF)를 컨볼루션하여 헤드폰에서 방향감 있는 입체음향을 생성합니다.</text>
  <text x="640" y="670" font-size="17" fill="#6c727d">Per-position HRTF convolution renders directional, immersive binaural sound over headphones on a mobile SoC.</text>
</svg>
