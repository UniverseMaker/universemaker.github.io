<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" font-family="'Pretendard','Noto Sans KR',-apple-system,'Segoe UI',sans-serif">
  <defs>
    <linearGradient id="navy" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#3a4cf0"/>
      <stop offset="0.55" stop-color="#232a73"/>
      <stop offset="1" stop-color="#0e1132"/>
    </linearGradient>
    <linearGradient id="mirror" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1b2461"/>
      <stop offset="1" stop-color="#0e1132"/>
    </linearGradient>
    <marker id="arw" markerWidth="12" markerHeight="12" refX="8" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#3a4cf0"/>
    </marker>
    <filter id="sh" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="7" flood-color="#15171a" flood-opacity="0.13"/>
    </filter>
  </defs>

  <rect width="1600" height="900" fill="#ffffff"/>

  <!-- Title -->
  <text x="72" y="86" font-size="42" font-weight="700" fill="#15171a">비접촉 생체신호 측정 파이프라인</text>
  <text x="72" y="126" font-size="24" font-weight="600" fill="#3a4cf0">rPPG · Remote Photoplethysmography — Camera to Heart Rate</text>
  <line x1="72" y1="150" x2="1528" y2="150" stroke="#e7e8ec" stroke-width="2"/>

  <!-- Smart mirror illustration (left context) -->
  <g transform="translate(72,210)" filter="url(#sh)">
    <rect x="0" y="0" width="250" height="470" rx="18" fill="url(#mirror)"/>
    <rect x="16" y="16" width="218" height="438" rx="10" fill="#141a3d" stroke="#3a4cf0" stroke-width="1.5" opacity="0.9"/>
    <!-- face -->
    <circle cx="125" cy="150" r="58" fill="none" stroke="#8b9bff" stroke-width="2.5"/>
    <rect x="88" y="118" width="74" height="66" rx="10" fill="none" stroke="#3a4cf0" stroke-width="2.5" stroke-dasharray="6 5"/>
    <text x="125" y="215" text-anchor="middle" font-size="15" fill="#8b9bff">Face ROI</text>
    <!-- vital readout -->
    <text x="125" y="300" text-anchor="middle" font-size="46" font-weight="700" fill="#ffffff">72</text>
    <text x="125" y="326" text-anchor="middle" font-size="15" fill="#aab6ff">BPM · 심박수</text>
    <polyline points="30,380 55,380 68,352 82,406 96,368 118,380 220,380" fill="none" stroke="#3a4cf0" stroke-width="2.5"/>
    <text x="125" y="440" text-anchor="middle" font-size="14" fill="#6c7bd6">Smart Mirror Display</text>
  </g>
  <text x="197" y="712" text-anchor="middle" font-size="17" font-weight="600" fill="#15171a">스마트미러</text>

  <!-- Pipeline stages -->
  <!-- Stage box helper coordinates -->
  <!-- 1 Camera -->
  <g transform="translate(400,255)">
    <rect width="220" height="150" rx="16" fill="#f7f7f5" stroke="#3a4cf0" stroke-width="2.5" filter="url(#sh)"/>
    <circle cx="110" cy="52" r="26" fill="none" stroke="#3a4cf0" stroke-width="3"/>
    <circle cx="110" cy="52" r="11" fill="#3a4cf0"/>
    <text x="110" y="104" text-anchor="middle" font-size="20" font-weight="700" fill="#15171a">Camera</text>
    <text x="110" y="130" text-anchor="middle" font-size="15" fill="#6c727d">카메라 영상 (RGB)</text>
  </g>

  <!-- 2 Face detection / ROI -->
  <g transform="translate(690,255)">
    <rect width="220" height="150" rx="16" fill="#f7f7f5" stroke="#3a4cf0" stroke-width="2.5" filter="url(#sh)"/>
    <rect x="78" y="26" width="64" height="52" rx="8" fill="none" stroke="#3a4cf0" stroke-width="2.5" stroke-dasharray="6 4"/>
    <circle cx="110" cy="52" r="30" fill="none" stroke="#232a73" stroke-width="2"/>
    <text x="110" y="104" text-anchor="middle" font-size="20" font-weight="700" fill="#15171a">Face ROI</text>
    <text x="110" y="130" text-anchor="middle" font-size="15" fill="#6c727d">얼굴 검출·관심영역</text>
  </g>

  <!-- 3 RGB signal extraction -->
  <g transform="translate(980,255)">
    <rect width="220" height="150" rx="16" fill="#f7f7f5" stroke="#3a4cf0" stroke-width="2.5" filter="url(#sh)"/>
    <line x1="34" y1="70" x2="186" y2="70" stroke="#e7e8ec" stroke-width="1.5"/>
    <polyline points="34,64 60,50 86,74 112,44 138,72 164,52 186,66" fill="none" stroke="#e0413a" stroke-width="2"/>
    <polyline points="34,72 60,60 86,82 112,56 138,80 164,62 186,74" fill="none" stroke="#3a4cf0" stroke-width="2"/>
    <polyline points="34,80 60,70 86,90 112,66 138,88 164,72 186,82" fill="none" stroke="#1b8a4a" stroke-width="2"/>
    <text x="110" y="112" text-anchor="middle" font-size="20" font-weight="700" fill="#15171a">RGB Signal</text>
    <text x="110" y="136" text-anchor="middle" font-size="15" fill="#6c727d">채널별 신호 추출</text>
  </g>

  <!-- 4 Filtering / FFT -->
  <g transform="translate(1270,255)">
    <rect width="220" height="150" rx="16" fill="#f7f7f5" stroke="#3a4cf0" stroke-width="2.5" filter="url(#sh)"/>
    <line x1="34" y1="88" x2="186" y2="88" stroke="#c9cbd6" stroke-width="1.5"/>
    <rect x="46" y="70" width="12" height="18" fill="#8b9bff"/>
    <rect x="66" y="52" width="12" height="36" fill="#3a4cf0"/>
    <rect x="86" y="30" width="12" height="58" fill="#2233c4"/>
    <rect x="106" y="46" width="12" height="42" fill="#3a4cf0"/>
    <rect x="126" y="66" width="12" height="22" fill="#8b9bff"/>
    <rect x="146" y="74" width="12" height="14" fill="#8b9bff"/>
    <text x="110" y="112" text-anchor="middle" font-size="20" font-weight="700" fill="#15171a">Filter · FFT</text>
    <text x="110" y="136" text-anchor="middle" font-size="15" fill="#6c727d">대역필터·주파수분석</text>
  </g>

  <!-- 5 Heart rate result (bottom center) -->
  <g transform="translate(980,540)">
    <rect width="510" height="150" rx="16" fill="url(#navy)" filter="url(#sh)"/>
    <path d="M40,86 c0,-26 40,-26 40,0 c0,26 -40,42 -40,42 c0,0 -40,-16 -40,-42 c0,-26 40,-26 40,0 z" transform="translate(20,-14)" fill="#ffffff" opacity="0.92"/>
    <text x="200" y="70" font-size="30" font-weight="700" fill="#ffffff">Heart Rate 심박수</text>
    <text x="200" y="118" font-size="52" font-weight="700" fill="#ffffff">72 <tspan font-size="24" font-weight="600" fill="#aab6ff">BPM</tspan></text>
    <text x="380" y="70" font-size="15" fill="#aab6ff">peak frequency</text>
    <text x="380" y="92" font-size="15" fill="#aab6ff">→ 1.2 Hz × 60</text>
  </g>

  <!-- Horizontal arrows between top stages -->
  <g stroke="#3a4cf0" stroke-width="3" marker-end="url(#arw)" fill="none">
    <line x1="322" y1="330" x2="396" y2="330"/>
    <line x1="620" y1="330" x2="686" y2="330"/>
    <line x1="910" y1="330" x2="976" y2="330"/>
    <line x1="1200" y1="330" x2="1266" y2="330"/>
  </g>
  <!-- Arrow from Filter/FFT down to Heart Rate -->
  <path d="M1380,405 L1380,470 L1235,470 L1235,536" stroke="#3a4cf0" stroke-width="3" fill="none" marker-end="url(#arw)"/>

  <!-- Stage numbers -->
  <g font-size="15" font-weight="700" fill="#ffffff">
    <circle cx="410" cy="245" r="16" fill="#232a73"/><text x="410" y="250" text-anchor="middle">1</text>
    <circle cx="700" cy="245" r="16" fill="#232a73"/><text x="700" y="250" text-anchor="middle">2</text>
    <circle cx="990" cy="245" r="16" fill="#232a73"/><text x="990" y="250" text-anchor="middle">3</text>
    <circle cx="1280" cy="245" r="16" fill="#232a73"/><text x="1280" y="250" text-anchor="middle">4</text>
    <circle cx="990" cy="530" r="16" fill="#3a4cf0"/><text x="990" y="535" text-anchor="middle">5</text>
  </g>

  <!-- Caption -->
  <text x="400" y="770" font-size="17" fill="#6c727d">카메라 영상에서 얼굴 피부의 미세한 색 변화(혈류)를 분석해 접촉 센서 없이 심박수를 추정합니다.</text>
  <text x="400" y="800" font-size="17" fill="#6c727d">Skin colour micro-variations in facial video are analysed to estimate heart rate without any contact sensor.</text>
</svg>
