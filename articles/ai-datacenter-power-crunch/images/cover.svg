<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" width="1200" height="675" role="img" aria-label="전력망과 AI 칩이 만나는 그리드-투-칩 개념도">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0a0f2c"/>
      <stop offset="0.55" stop-color="#111a48"/>
      <stop offset="1" stop-color="#182a6e"/>
    </linearGradient>
    <linearGradient id="line" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#ffd166"/>
      <stop offset="1" stop-color="#ff8a5b"/>
    </linearGradient>
    <linearGradient id="chip" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#5b74ff"/>
      <stop offset="1" stop-color="#2233c4"/>
    </linearGradient>
    <filter id="soft" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="8"/>
    </filter>
  </defs>

  <rect width="1200" height="675" fill="url(#bg)"/>

  <!-- faint grid -->
  <g stroke="#38468f" stroke-width="1" opacity="0.20">
    <path d="M0 112 H1200 M0 225 H1200 M0 337 H1200 M0 450 H1200 M0 562 H1200"/>
    <path d="M150 0 V675 M300 0 V675 M450 0 V675 M600 0 V675 M750 0 V675 M900 0 V675 M1050 0 V675"/>
  </g>

  <!-- transmission towers (left) -->
  <g stroke="#8ea2ff" stroke-width="3" fill="none" opacity="0.85">
    <path d="M120 470 L150 250 L180 470 M132 380 L168 380 M120 300 L180 300"/>
    <path d="M255 470 L285 250 L315 470 M267 380 L303 380 M255 300 L315 300"/>
  </g>
  <!-- power lines sagging toward chip -->
  <g stroke="url(#line)" stroke-width="3.5" fill="none" opacity="0.9">
    <path d="M150 260 C 320 330, 470 330, 560 337"/>
    <path d="M285 260 C 400 350, 480 352, 560 360"/>
    <path d="M285 300 C 410 400, 480 402, 560 384"/>
  </g>

  <!-- energy pulses -->
  <g fill="#ffd166">
    <circle cx="360" cy="335" r="5"/>
    <circle cx="450" cy="345" r="4"/>
    <circle cx="410" cy="378" r="4"/>
  </g>

  <!-- central AI chip -->
  <g>
    <rect x="560" y="277" width="150" height="150" rx="18" fill="url(#chip)" filter="url(#soft)" opacity="0.55"/>
    <rect x="572" y="289" width="126" height="126" rx="14" fill="url(#chip)" stroke="#dfe6ff" stroke-width="2"/>
    <!-- pins -->
    <g stroke="#8ad8ff" stroke-width="4">
      <path d="M600 289 V270 M635 289 V270 M670 289 V270"/>
      <path d="M600 415 V434 M635 415 V434 M670 415 V434"/>
      <path d="M572 320 H553 M572 352 H553 M572 384 H553"/>
      <path d="M698 320 H717 M698 352 H717 M698 384 H717"/>
    </g>
    <text x="635" y="360" text-anchor="middle" font-family="'Segoe UI',sans-serif" font-size="38" font-weight="700" fill="#ffffff">AI</text>
    <text x="635" y="388" text-anchor="middle" font-family="'Segoe UI',sans-serif" font-size="14" letter-spacing="3" fill="#cdd6ff">GPU</text>
  </g>

  <!-- rack lines (right) -->
  <g stroke="#7ff0c0" stroke-width="3.5" fill="none" opacity="0.9">
    <path d="M710 337 H820"/>
    <path d="M710 360 H820"/>
    <path d="M710 384 H820"/>
  </g>
  <g fill="#0a0f2c" stroke="#7ff0c0" stroke-width="2">
    <rect x="820" y="250" width="120" height="185" rx="10"/>
  </g>
  <g stroke="#7ff0c0" stroke-width="2" opacity="0.7">
    <path d="M820 288 H940 M820 326 H940 M820 364 H940 M820 400 H940"/>
  </g>
  <g fill="#7ff0c0">
    <circle cx="835" cy="269" r="3"/><circle cx="835" cy="307" r="3"/><circle cx="835" cy="345" r="3"/><circle cx="835" cy="383" r="3"/><circle cx="835" cy="419" r="3"/>
  </g>

  <!-- title band -->
  <text x="600" y="600" text-anchor="middle" font-family="'Georgia',serif" font-size="34" font-weight="600" fill="#ffffff">AI의 진짜 한계는 전기다</text>
  <text x="600" y="640" text-anchor="middle" font-family="'Segoe UI',sans-serif" font-size="16" letter-spacing="3" fill="#ffcf87">GRID-TO-CHIP · 945 TWh</text>
</svg>
