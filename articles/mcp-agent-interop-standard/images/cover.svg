<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" width="1200" height="675" role="img" aria-label="MCP 에이전트 상호운용성 프로토콜 개념도">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0b1030"/>
      <stop offset="0.55" stop-color="#131a4a"/>
      <stop offset="1" stop-color="#1b2570"/>
    </linearGradient>
    <linearGradient id="wire" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#4f7bff"/>
      <stop offset="1" stop-color="#8ad8ff"/>
    </linearGradient>
    <radialGradient id="core" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#aebcff"/>
      <stop offset="0.5" stop-color="#5b74ff"/>
      <stop offset="1" stop-color="#2233c4"/>
    </radialGradient>
    <filter id="soft" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="7"/>
    </filter>
  </defs>

  <rect width="1200" height="675" fill="url(#bg)"/>

  <!-- faint grid -->
  <g stroke="#3a4790" stroke-width="1" opacity="0.22">
    <path d="M0 112 H1200 M0 225 H1200 M0 337 H1200 M0 450 H1200 M0 562 H1200"/>
    <path d="M150 0 V675 M300 0 V675 M450 0 V675 M600 0 V675 M750 0 V675 M900 0 V675 M1050 0 V675"/>
  </g>

  <!-- connective wires from hub to satellites -->
  <g stroke="url(#wire)" stroke-width="3" fill="none" opacity="0.85">
    <path d="M600 337 C 420 200, 320 180, 210 165"/>
    <path d="M600 337 C 430 300, 340 320, 200 345"/>
    <path d="M600 337 C 420 470, 330 500, 210 520"/>
    <path d="M600 337 C 780 200, 880 180, 990 165"/>
    <path d="M600 337 C 770 300, 860 320, 1000 345"/>
    <path d="M600 337 C 780 470, 870 500, 990 520"/>
  </g>

  <!-- satellite nodes -->
  <g font-family="'Segoe UI',sans-serif" font-size="19" fill="#0b1030" text-anchor="middle">
    <g>
      <circle cx="185" cy="165" r="34" fill="#8ad8ff"/>
      <text x="185" y="171">앱</text>
    </g>
    <g>
      <circle cx="175" cy="345" r="34" fill="#8ad8ff"/>
      <text x="175" y="351">IDE</text>
    </g>
    <g>
      <circle cx="185" cy="520" r="34" fill="#8ad8ff"/>
      <text x="185" y="526">에이전트</text>
    </g>
    <g>
      <circle cx="1015" cy="165" r="34" fill="#7ff0c0"/>
      <text x="1015" y="171">DB</text>
    </g>
    <g>
      <circle cx="1025" cy="345" r="34" fill="#7ff0c0"/>
      <text x="1025" y="351">API</text>
    </g>
    <g>
      <circle cx="1015" cy="520" r="34" fill="#7ff0c0"/>
      <text x="1015" y="526">파일</text>
    </g>
  </g>

  <!-- central hub -->
  <circle cx="600" cy="337" r="118" fill="url(#core)" filter="url(#soft)" opacity="0.55"/>
  <circle cx="600" cy="337" r="96" fill="url(#core)" stroke="#dfe6ff" stroke-width="2"/>
  <text x="600" y="326" text-anchor="middle" font-family="'Segoe UI',sans-serif" font-size="52" font-weight="700" fill="#ffffff">MCP</text>
  <text x="600" y="362" text-anchor="middle" font-family="'Segoe UI',sans-serif" font-size="18" letter-spacing="2" fill="#cdd6ff">PROTOCOL</text>

  <!-- title band -->
  <text x="600" y="612" text-anchor="middle" font-family="'Georgia',serif" font-size="34" font-weight="600" fill="#ffffff">AI의 HTTP가 된 프로토콜</text>
  <text x="600" y="648" text-anchor="middle" font-family="'Segoe UI',sans-serif" font-size="17" letter-spacing="3" fill="#8ea2ff">MCP · AGENT INTEROPERABILITY STANDARD</text>
</svg>
